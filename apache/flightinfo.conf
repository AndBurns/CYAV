# Apache/mod_wsgi config snippet for serving this Flask app at:
# https://a-burns.com/FlightInfo
#
# Assumes this project is reachable at:
# /var/www/a-burns.com/public_html/FlightInfo
# (including your existing symlink)

# Keep /FlightInfo canonical with trailing slash.
RedirectMatch 301 ^/FlightInfo$ /FlightInfo/

# Run the app in its own daemon process.
# Update python-home to your virtualenv path.
WSGIDaemonProcess flightinfo \
    python-home=/var/www/a-burns.com/venv \
    python-path=/var/www/a-burns.com/public_html/FlightInfo

WSGIProcessGroup flightinfo
WSGIScriptAlias /FlightInfo /var/www/a-burns.com/public_html/FlightInfo/wsgi.py

<Directory /var/www/a-burns.com/public_html/FlightInfo>
    Options FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>
